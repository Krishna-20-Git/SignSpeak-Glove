name: sign_to_speech
description: SignSpeak - Multilingual Sign Language Assistive Communication
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_tts: ^4.0.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/gesture_map_en.json
    - assets/gesture_map_hi.json
    - assets/gesture_map_ta.json
    - assets/gesture_map_bn.json
